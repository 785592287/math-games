<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乘法小游戏 🎮</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Arial Black', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      padding: 20px;
    }
    .game-container {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    h1 { 
      font-size: 2.5em; 
      margin-bottom: 10px; 
      text-shadow: 3px 3px 6px rgba(0,0,0,0.3); 
    }
    .subtitle {
      font-size: 1.2em;
      opacity: 0.9;
      margin-bottom: 20px;
    }
    .stats {
      display: flex;
      justify-content: space-around;
      margin: 25px 0;
      font-size: 1.3em;
    }
    .stat-box {
      background: rgba(255,255,255,0.2);
      padding: 12px 20px;
      border-radius: 15px;
      min-width: 80px;
    }
    .stat-label { font-size: 0.7em; opacity: 0.8; }
    .stat-value { font-size: 1.5em; font-weight: bold; }
    .problem {
      font-size: 4em;
      margin: 30px 0;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    .visual-aid {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 20px 0;
      font-size: 1.5em;
    }
    .group {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      max-width: 150px;
      justify-content: center;
    }
    .dot {
      width: 20px;
      height: 20px;
      background: #FFD700;
      border-radius: 50%;
      animation: pop 0.3s ease;
    }
    @keyframes pop {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }
    .answer-input {
      font-size: 2em;
      padding: 15px;
      border: none;
      border-radius: 15px;
      text-align: center;
      width: 100%;
      margin: 15px 0;
      background: white;
      color: #333;
      font-weight: bold;
    }
    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .button {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 1.3em;
      border-radius: 15px;
      cursor: pointer;
      transition: transform 0.2s;
      font-weight: bold;
    }
    .button:hover { transform: scale(1.05); }
    .button:active { transform: scale(0.95); }
    .button.hint {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    }
    .feedback {
      font-size: 1.8em;
      margin: 15px 0;
      min-height: 50px;
    }
    .correct { color: #4CAF50; }
    .incorrect { color: #FF6347; }
    .hint-text {
      background: rgba(255,255,255,0.2);
      padding: 15px;
      border-radius: 15px;
      margin: 15px 0;
      font-size: 1.1em;
    }
    .multiplication-table {
      margin-top: 30px;
      padding: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
    }
    .multiplication-table h3 {
      margin-bottom: 15px;
      font-size: 1.2em;
    }
    .table-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 5px;
      font-size: 0.9em;
    }
    .table-cell {
      padding: 8px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
    }
    .table-header {
      background: rgba(255,215,0,0.4);
      font-weight: bold;
    }
    .achievement-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #333;
      padding: 30px 50px;
      border-radius: 20px;
      font-size: 1.8em;
      font-weight: bold;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: popIn 0.5s ease forwards;
      z-index: 1000;
    }
    @keyframes popIn {
      to { transform: translate(-50%, -50%) scale(1); }
    }
    .mode-selector {
      margin-bottom: 20px;
    }
    .mode-btn {
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.5);
      color: white;
      padding: 10px 20px;
      margin: 5px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1em;
      transition: all 0.3s;
    }
    .mode-btn.active {
      background: rgba(255,255,255,0.4);
      border-color: white;
    }
    .mode-btn:hover {
      background: rgba(255,255,255,0.3);
    }
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      animation: fall 3s ease-out forwards;
    }
    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>🎮 乘法小游戏</h1>
    <div class="subtitle">学会乘法，变得更强！</div>

    <div class="mode-selector">
      <button class="mode-btn active" onclick="setMode(1, 5)">1-5</button>
      <button class="mode-btn" onclick="setMode(1, 9)">1-9</button>
      <button class="mode-btn" onclick="setMode(2, 9)">2-9</button>
      <button class="mode-btn" onclick="setMode(6, 9)">6-9</button>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">得分</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">连胜</div>
        <div class="stat-value" id="streak">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">等级</div>
        <div class="stat-value" id="level">1</div>
      </div>
    </div>

    <div class="problem" id="problem">3 × 4 = ?</div>
    
    <div class="visual-aid" id="visualAid"></div>

    <input type="number" class="answer-input" id="answer" placeholder="输入答案..." autofocus>

    <div class="buttons">
      <button class="button" onclick="checkAnswer()">提交 ✓</button>
      <button class="button hint" onclick="showHint()">提示 💡</button>
    </div>

    <div class="feedback" id="feedback"></div>
    <div class="hint-text" id="hintText" style="display:none;"></div>

    <div class="multiplication-table">
      <h3>📋 乘法口诀表</h3>
      <div class="table-grid" id="multiplicationTable"></div>
    </div>
  </div>

  <script>
    let score = 0;
    let streak = 0;
    let level = 1;
    let currentProblem = {};
    let minNum = 1;
    let maxNum = 5;
    let hintsUsed = 0;

    function setMode(min, max) {
      minNum = min;
      maxNum = max;
      document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      generateProblem();
    }

    function generateProblem() {
      const num1 = Math.floor(Math.random() * (maxNum - minNum + 1)) + minNum;
      const num2 = Math.floor(Math.random() * (maxNum - minNum + 1)) + minNum;
      
      currentProblem = { num1, num2, answer: num1 * num2 };
      document.getElementById('problem').textContent = `${num1} × ${num2} = ?`;
      document.getElementById('answer').value = '';
      document.getElementById('answer').focus();
      document.getElementById('hintText').style.display = 'none';
      
      updateVisualAid(num1, num2);
    }

    function updateVisualAid(num1, num2) {
      const container = document.getElementById('visualAid');
      if (num1 > 5 || num2 > 5) {
        container.innerHTML = '';
        return;
      }
      
      let html = '';
      for (let g = 0; g < num1; g++) {
        html += '<div class="group">';
        for (let i = 0; i < num2; i++) {
          html += '<div class="dot"></div>';
        }
        html += '</div>';
      }
      container.innerHTML = html;
    }

    function checkAnswer() {
      const userAnswer = parseInt(document.getElementById('answer').value);
      const feedback = document.getElementById('feedback');

      if (isNaN(userAnswer)) {
        feedback.innerHTML = '<span class="incorrect">请输入数字！</span>';
        return;
      }

      if (userAnswer === currentProblem.answer) {
        streak++;
        hintsUsed = 0;
        const basePoints = 10;
        const streakBonus = Math.floor(streak * 2);
        const points = basePoints + streakBonus;
        score += points;

        feedback.innerHTML = `<span class="correct">✓ 太棒了！+${points}分</span>`;

        if (streak % 5 === 0) {
          level++;
          showAchievement(`🔥 ${streak}连胜！升级了！`);
        }

        if (streak === 10) showAchievement('🏆 乘法达人！');
        if (score >= 100 && score < 120) showAchievement('⭐ 百分达人！');

        updateStats();
        setTimeout(generateProblem, 800);
      } else {
        streak = 0;
        feedback.innerHTML = `<span class="incorrect">✗ 再试试！答案是 ${currentProblem.answer}</span>`;
        updateStats();
        setTimeout(() => {
          feedback.innerHTML = '';
          generateProblem();
        }, 2000);
      }
    }

    function showHint() {
      const hint = document.getElementById('hintText');
      const { num1, num2 } = currentProblem;
      
      hintsUsed++;
      let hintText = '';
      
      if (num1 <= 5 && num2 <= 5) {
        hintText = `💡 提示：${num1}个${num2}加起来是多少？<br>`;
        hintText += `数一数上面有多少个金色圆点！`;
      } else {
        hintText = `💡 提示：${num1} × ${num2} = ${num1} + ${num1} + ... (${num2}次)<br>`;
        hintText += `或者想：${num2} × ${num1} 也是一样的！`;
      }
      
      hint.innerHTML = hintText;
      hint.style.display = 'block';
    }

    function updateStats() {
      document.getElementById('score').textContent = score;
      document.getElementById('streak').textContent = streak;
      document.getElementById('level').textContent = level;
    }

    function showAchievement(text) {
      const popup = document.createElement('div');
      popup.className = 'achievement-popup';
      popup.textContent = text;
      document.body.appendChild(popup);
      
      createConfetti();
      
      setTimeout(() => popup.remove(), 2500);
    }

    function createConfetti() {
      const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#F38181'];
      for (let i = 0; i < 30; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.top = '-10px';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 3000);
      }
    }

    function generateMultiplicationTable() {
      const table = document.getElementById('multiplicationTable');
      let html = '<div class="table-cell table-header">×</div>';
      
      for (let i = 1; i <= 9; i++) {
        html += `<div class="table-cell table-header">${i}</div>`;
      }
      
      for (let i = 1; i <= 9; i++) {
        html += `<div class="table-cell table-header">${i}</div>`;
        for (let j = 1; j <= 9; j++) {
          html += `<div class="table-cell">${i * j}</div>`;
        }
      }
      
      table.innerHTML = html;
    }

    // Enter key submits answer
    document.getElementById('answer').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') checkAnswer();
    });

    // Initialize
    generateMultiplicationTable();
    generateProblem();
  </script>
</body>
</html>
