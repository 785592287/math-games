<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚀 乘法大冒险 - 小学数学游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Comic Sans MS', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .game-container {
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            flex-wrap: wrap;
            gap: 15px;
        }

        .score-item {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 1.2em;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(240,147,251,0.4);
            min-width: 120px;
            text-align: center;
        }

        .streak {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .question-area {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            border-radius: 25px;
            padding: 40px 30px;
            margin: 30px 0;
            text-align: center;
            position: relative;
        }

        .question {
            font-size: 4em;
            color: #333;
            font-weight: bold;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .number {
            background: white;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-width: 80px;
            display: inline-block;
        }

        .operator {
            color: #667eea;
            font-size: 3em;
        }

        .answer-input {
            width: 100%;
            max-width: 300px;
            padding: 20px;
            font-size: 2em;
            text-align: center;
            border: 4px solid #667eea;
            border-radius: 20px;
            margin: 20px 0;
            outline: none;
            transition: all 0.3s;
        }

        .answer-input:focus {
            border-color: #f093fb;
            box-shadow: 0 0 20px rgba(240,147,251,0.5);
            transform: scale(1.05);
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.3em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.6);
        }

        .btn-hint {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            color: #333;
        }

        .btn-hint:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(252,182,159,0.6);
        }

        .btn-next {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
        }

        .btn-next:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(168,237,234,0.6);
        }

        .feedback {
            text-align: center;
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            font-size: 1.5em;
            font-weight: bold;
            display: none;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .correct {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #2d5016;
            display: block;
        }

        .wrong {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: #8b0000;
            display: block;
        }

        .hint-box {
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            display: none;
            font-size: 1.2em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .hint-box.show {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .visual-hint {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .dot-group {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 15px;
        }

        .dot {
            width: 20px;
            height: 20px;
            background: #667eea;
            border-radius: 50%;
            display: inline-block;
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .achievements {
            margin-top: 30px;
            text-align: center;
        }

        .achievement {
            display: inline-block;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            padding: 10px 20px;
            border-radius: 20px;
            margin: 5px;
            font-size: 1em;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s;
        }

        .achievement.show {
            opacity: 1;
            transform: scale(1);
        }

        .level-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255,154,158,0.4);
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease-out;
            border-radius: 10px;
        }

        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #f00;
            animation: confetti-fall 3s ease-out forwards;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* 平板优化 */
        @media (max-width: 768px) {
            .game-container {
                padding: 30px 20px;
                border-radius: 20px;
            }

            .title {
                font-size: 2em;
            }

            .question {
                font-size: 3em;
                gap: 15px;
            }

            .number {
                padding: 12px 20px;
                min-width: 60px;
            }

            .answer-input {
                font-size: 1.8em;
                padding: 15px;
            }

            .btn {
                padding: 12px 30px;
                font-size: 1.1em;
            }

            .score-item {
                font-size: 1em;
                padding: 12px 20px;
                min-width: 100px;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 1.8em;
            }

            .question {
                font-size: 2.5em;
                flex-direction: column;
                gap: 10px;
            }

            .score-board {
                gap: 10px;
            }

            .score-item {
                font-size: 0.9em;
                padding: 10px 15px;
            }

            .btn {
                padding: 10px 25px;
                font-size: 1em;
            }
        }

        /* 触摸设备优化 */
        @media (hover: none) {
            .btn:hover {
                transform: none;
            }

            .btn:active {
                transform: scale(0.95);
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="level-indicator" id="level">🌟 等级 1</div>

        <div class="header">
            <h1 class="title">🚀 乘法大冒险</h1>
        </div>

        <div class="score-board">
            <div class="score-item">🏆 得分: <span id="score">0</span></div>
            <div class="score-item streak">🔥 连续: <span id="streak">0</span></div>
            <div class="score-item">⭐ 总题: <span id="total">0</span></div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress" style="width: 0%"></div>
        </div>

        <div class="question-area">
            <div class="question">
                <span class="number" id="num1">0</span>
                <span class="operator">×</span>
                <span class="number" id="num2">0</span>
                <span class="operator">=</span>
                <span class="number" id="result">?</span>
            </div>

            <input type="number" class="answer-input" id="answer" placeholder="输入答案" autocomplete="off">

            <div class="buttons">
                <button class="btn btn-submit" onclick="checkAnswer()">✅ 提交</button>
                <button class="btn btn-hint" onclick="showHint()">💡 提示</button>
                <button class="btn btn-next" onclick="nextQuestion()" style="display:none" id="nextBtn">➡️ 下一题</button>
            </div>
        </div>

        <div class="feedback" id="feedback"></div>

        <div class="hint-box" id="hintBox">
            <p><strong>💭 提示：</strong></p>
            <p id="hintText"></p>
            <div class="visual-hint" id="visualHint"></div>
        </div>

        <div class="achievements">
            <div class="achievement" id="ach1">🌟 初学者 - 完成第一题</div>
            <div class="achievement" id="ach2">🔥 小火焰 - 连续答对5题</div>
            <div class="achievement" id="ach3">⚡ 闪电侠 - 连续答对10题</div>
            <div class="achievement" id="ach4">🎯 神射手 - 得分达到50</div>
            <div class="achievement" id="ach5">🏆 数学大师 - 得分达到100</div>
        </div>
    </div>

    <div class="confetti" id="confetti"></div>

    <script>
        // 游戏状态
        let score = 0;
        let streak = 0;
        let totalQuestions = 0;
        let correctAnswers = 0;
        let currentNum1 = 0;
        let currentNum2 = 0;
        let level = 1;
        let achievements = {
            first: false,
            streak5: false,
            streak10: false,
            score50: false,
            score100: false
        };

        // 生成新题目
        function generateQuestion() {
            // 根据等级调整难度
            const maxNum = Math.min(2 + level, 12);
            currentNum1 = Math.floor(Math.random() * maxNum) + 1;
            currentNum2 = Math.floor(Math.random() * maxNum) + 1;

            document.getElementById('num1').textContent = currentNum1;
            document.getElementById('num2').textContent = currentNum2;
            document.getElementById('result').textContent = '?';
            document.getElementById('answer').value = '';
            document.getElementById('answer').focus();
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('hintBox').classList.remove('show');
        }

        // 检查答案
        function checkAnswer() {
            const userAnswer = parseInt(document.getElementById('answer').value);
            const correctAnswer = currentNum1 * currentNum2;
            const feedback = document.getElementById('feedback');

            if (isNaN(userAnswer)) {
                feedback.textContent = '🤔 请输入一个数字！';
                feedback.className = 'feedback wrong';
                return;
            }

            totalQuestions++;

            if (userAnswer === correctAnswer) {
                // 答对了
                correctAnswers++;
                streak++;
                score += 10 + (streak * 2); // 连续答对奖励更多分

                feedback.textContent = '🎉 太棒了！你答对了！';
                feedback.className = 'feedback correct';

                document.getElementById('result').textContent = correctAnswer;

                // 更新进度条
                const progress = (correctAnswers % 10) * 10;
                document.getElementById('progress').style.width = progress + '%';

                // 升级
                if (correctAnswers % 10 === 0 && correctAnswers > 0) {
                    level++;
                    document.getElementById('level').textContent = '🌟 等级 ' + level;
                    triggerConfetti();
                }

                // 检查成就
                checkAchievements();

                // 小庆祝动画
                if (streak >= 3) {
                    triggerConfetti();
                }
            } else {
                // 答错了
                streak = 0;
                feedback.textContent = `😅 答错了！正确答案是 ${correctAnswer}`;
                feedback.className = 'feedback wrong';
                document.getElementById('result').textContent = correctAnswer;
            }

            // 更新分数显示
            updateDisplay();
            document.getElementById('nextBtn').style.display = 'inline-block';
        }

        // 更新显示
        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('total').textContent = totalQuestions;
        }

        // 显示提示
        function showHint() {
            const hintText = `
                ${currentNum1} × ${currentNum2} 就是 ${currentNum1} 个 ${currentNum2} 相加，<br>
                或者 ${currentNum2} 个 ${currentNum1} 相加。<br>
                试着数一数下面的小圆点！
            `;

            document.getElementById('hintText').innerHTML = hintText;

            // 生成可视化圆点
            const visualHint = document.getElementById('visualHint');
            visualHint.innerHTML = '';

            const dotGroup1 = document.createElement('div');
            dotGroup1.className = 'dot-group';
            for (let i = 0; i < currentNum1 * currentNum2; i++) {
                const dot = document.createElement('span');
                dot.className = 'dot';
                dot.style.animationDelay = (i * 0.05) + 's';
                dotGroup1.appendChild(dot);
            }
            visualHint.appendChild(dotGroup1);

            document.getElementById('hintBox').classList.add('show');
        }

        // 检查成就
        function checkAchievements() {
            if (!achievements.first && totalQuestions === 1) {
                achievements.first = true;
                showAchievement('ach1');
            }

            if (!achievements.streak5 && streak >= 5) {
                achievements.streak5 = true;
                showAchievement('ach2');
            }

            if (!achievements.streak10 && streak >= 10) {
                achievements.streak10 = true;
                showAchievement('ach3');
            }

            if (!achievements.score50 && score >= 50) {
                achievements.score50 = true;
                showAchievement('ach4');
            }

            if (!achievements.score100 && score >= 100) {
                achievements.score100 = true;
                showAchievement('ach5');
            }
        }

        // 显示成就
        function showAchievement(id) {
            const achievement = document.getElementById(id);
            achievement.classList.add('show');
            triggerConfetti();
        }

        // 下一题
        function nextQuestion() {
            generateQuestion();
        }

        // 彩带效果
        function triggerConfetti() {
            const confettiContainer = document.getElementById('confetti');
            const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#fa709a', '#fee140', '#84fab0', '#8fd3f4'];

            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti-piece';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
                confettiContainer.appendChild(confetti);

                // 清理
                setTimeout(() => confetti.remove(), 5000);
            }
        }

        // 键盘事件 - 按回车提交
        document.getElementById('answer').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // 初始化游戏
        generateQuestion();
    </script>
</body>
</html>
